<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capy playground — try it in your browser</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-pane: #161b22;
      --bg-active: #1c2330;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-2: #a5d6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --err: #f85149;
      --muted: #8b949e;
      --text: #c9d1d9;
      --kw: #ff7b72;
      --str: #a5d6ff;
      --num: #79c0ff;
      --cmt: #6e7681;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif; }
    body { display: flex; flex-direction: column; }

    header.toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg-pane);
      flex-wrap: wrap;
    }
    header.toolbar .brand { font-weight: 600; color: var(--accent-2); margin-right: 8px; }
    header.toolbar .ver { font-size: 11px; color: var(--muted); margin-right: 8px; }
    header.toolbar label { color: var(--muted); font-size: 12px; }
    header.toolbar select, header.toolbar button {
      background: var(--bg-active); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 12px; font-size: 13px; cursor: pointer;
      font-family: inherit;
    }
    header.toolbar select { min-width: 240px; max-width: 320px; }
    header.toolbar select optgroup { color: var(--accent-2); font-style: normal; font-weight: 600; }
    header.toolbar select option { color: var(--text); }
    header.toolbar button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    header.toolbar button.primary:hover { filter: brightness(1.1); }
    header.toolbar button:hover { background: var(--bg); }
    header.toolbar .spacer { flex: 1; }
    header.toolbar .hint { color: var(--muted); font-size: 12px; }
    header.toolbar a { color: var(--accent); text-decoration: none; font-size: 12px; }

    .layout {
      flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      background: var(--border); min-height: 0;
    }
    .pane { display: flex; flex-direction: column; background: var(--bg-pane); min-height: 0; }
    .pane-head { padding: 8px 14px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .pane-head .label { color: var(--accent-2); }
    .pane-head .right { font-size: 11px; color: var(--muted); }
    .pane-head select { background: var(--bg-active); color: var(--text); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 8px; font-size: 11px; font-family: inherit; }

    /* Tab strip at the top of the LEFT pane — swaps between SCRIPT and LIBRARY editors. */
    .left-tabs { display: flex; gap: 0; flex: 1; }
    .left-tab {
      background: transparent;
      border: 0;
      color: var(--muted);
      padding: 0;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      margin-right: 22px;
      border-bottom: 2px solid transparent;
      padding-bottom: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .left-tab em {
      font-style: normal;
      color: var(--muted);
      opacity: 0.6;
      margin-left: 6px;
      letter-spacing: 0;
      text-transform: none;
      font-size: 10px;
    }
    .left-tab.active {
      color: var(--accent-2);
      border-bottom-color: var(--accent);
    }
    .left-tab.active em { color: var(--accent-2); opacity: 0.85; }
    .left-tab:hover:not(.active) { color: var(--text); }

    .editor-wrap { flex: 1; position: relative; min-height: 0; display: flex; }
    .editor {
      flex: 1; background: var(--bg-pane); color: var(--text);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px; line-height: 1.5;
      border: 0; outline: 0; padding: 14px 18px;
      resize: none; white-space: pre; tab-size: 4;
      overflow: auto;
    }
    .editor:focus { background: var(--bg); }

    .output-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 6px 8px; gap: 4px; flex-wrap: wrap; }
    .output-tabs button {
      background: transparent; color: var(--muted);
      border: 1px solid transparent; border-radius: 4px;
      padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit;
    }
    .output-tabs button:hover { background: var(--bg-active); }
    .output-tabs button.active { color: var(--text); background: var(--bg-active); border-color: var(--border); }
    .output-area { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; }
    pre.output, iframe.preview {
      flex: 1; margin: 0; padding: 14px 18px;
      background: var(--bg-pane); color: var(--text);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px; line-height: 1.5;
      overflow: auto; white-space: pre-wrap; word-break: break-word;
      border: 0;
    }
    iframe.preview { background: white; padding: 0; }

    /* Preview / Source toggle in the output pane. */
    .view-toggle { display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      border-bottom: 1px solid var(--border); background: var(--bg-pane); }
    .view-btn { background: transparent; border: 1px solid transparent;
      color: var(--muted); padding: 4px 10px; font-size: 11px; border-radius: 4px;
      cursor: pointer; font-family: inherit; }
    .view-btn:hover { background: var(--bg-active); }
    .view-btn.active { color: var(--text); background: var(--bg-active); border-color: var(--border); }
    .view-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .view-kind { margin-left: auto; color: var(--muted); font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase; }
    pre.output.error { color: var(--err); white-space: pre; word-break: normal; }
    pre.output.error .hint { color: var(--warn); }

    .description { padding: 8px 16px; background: var(--bg-active); color: var(--muted); font-size: 12px;
      border-bottom: 1px solid var(--border); }
    .description strong { color: var(--accent-2); }
    .description .tip { color: var(--text); }
    .description .tip::before { content: "💡 "; }

    .loading { padding: 20px; color: var(--muted); }

    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <span class="brand">Capy</span>
    <span class="ver" id="ver">playground</span>
    <label for="sample-picker">Sample:</label>
    <select id="sample-picker"></select>
    <button id="run-btn" class="primary" disabled>Loading…</button>
    <button id="download-btn">⤓ Download</button>
    <span class="spacer"></span>
    <span class="hint" id="status">loading wasm…</span>
    <a href="../../" target="_top">← back to docs</a>
  </header>

  <div class="description" id="description"></div>

  <div class="layout">
    <section class="pane">
      <div class="pane-head">
        <div class="left-tabs" id="left-tabs">
          <button class="left-tab active" data-target="script">YOUR SOURCE <em>script.capy</em></button>
          <button class="left-tab" data-target="library">LIBRARY <em>lib.capy</em></button>
        </div>
      </div>
      <div class="editor-wrap" id="script-wrap">
        <textarea id="script-editor" class="editor" spellcheck="false" placeholder="Loading sample…"></textarea>
      </div>
      <div class="editor-wrap" id="library-wrap" style="display: none;">
        <textarea id="library-editor" class="editor" spellcheck="false"
                  placeholder="Loading library…"></textarea>
      </div>
    </section>
    <section class="pane">
      <div class="pane-head">
        <span class="label">OUTPUT</span>
        <span class="right" id="output-meta"></span>
      </div>
      <div class="output-area">
        <div class="output-tabs" id="output-tabs"></div>
        <div id="output-container" style="flex:1; min-height: 0; display:flex;">
          <pre class="output" id="output">click <strong>Run</strong> to generate ⤴</pre>
        </div>
      </div>
    </section>
  </div>

  <script src="wasm_exec.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <!-- marked.js renders Markdown output as HTML in the preview pane. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    let SAMPLES = [];
    let currentResult = null;
    let activeFile = null;

    const $ = (id) => document.getElementById(id);
    const status = (msg) => { $("status").textContent = msg; };

    async function initWasm() {
      status("loading wasm…");
      const go = new Go();
      const resp = await fetch("capy.wasm");
      const bytes = await resp.arrayBuffer();
      const result = await WebAssembly.instantiate(bytes, go.importObject);
      go.run(result.instance);
      // Wait briefly for `capyRun` to be installed on window.
      for (let i = 0; i < 50 && typeof window.capyRun !== "function"; i++) {
        await new Promise(r => setTimeout(r, 20));
      }
      if (typeof window.capyRun !== "function") {
        status("wasm failed to initialize");
        return false;
      }
      try { $("ver").textContent = "v" + window.capyVersion(); } catch {}
      status("ready");
      $("run-btn").disabled = false;
      $("run-btn").textContent = "Run ▶";
      return true;
    }

    async function loadSamples() {
      const resp = await fetch("samples.json");
      const data = await resp.json();
      SAMPLES = data.samples;
      const picker = $("sample-picker");

      // Group samples into <optgroup>s by category so the dropdown is
      // scannable when there are many of them.
      const byCat = {};
      SAMPLES.forEach((s, i) => {
        const cat = s.category || "Other";
        (byCat[cat] ||= []).push({ idx: i, sample: s });
      });
      const order = data.categories && data.categories.length
        ? data.categories
        : Object.keys(byCat);
      for (const cat of order) {
        const entries = byCat[cat] || [];
        if (entries.length === 0) continue;
        const group = document.createElement("optgroup");
        group.label = cat;
        for (const { idx, sample } of entries) {
          const opt = document.createElement("option");
          opt.value = idx;
          opt.textContent = sample.title;
          group.appendChild(opt);
        }
        picker.appendChild(group);
      }
      picker.addEventListener("change", () => selectSample(parseInt(picker.value, 10)));
      selectSample(0);
    }

    function selectSample(idx) {
      const s = SAMPLES[idx];
      $("script-editor").value = s.script;
      $("library-editor").value = s.library;
      $("description").innerHTML =
        `<strong>${escapeHTML(s.title)}.</strong> ${escapeHTML(s.description)} ` +
        `<span class="tip">${escapeHTML(s.hint)}</span>`;
      // Auto-run on selection so the user sees output immediately.
      if (window.capyRun) run();
    }

    function escapeHTML(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function run() {
      const lib = $("library-editor").value;
      const script = $("script-editor").value;
      status("running…");
      // The wasm side does the work synchronously; defer to next tick so
      // the UI status updates first.
      setTimeout(() => {
        try {
          const res = window.capyRun(lib, "auto", script);
          renderResult(res);
        } catch (e) {
          renderError({ error: String(e) });
        }
      }, 10);
    }

    function renderResult(res) {
      if (!res.ok) { renderError(res); return; }
      currentResult = res;
      const files = res.files || {};
      const filePaths = Object.keys(files);
      const tabs = $("output-tabs");
      tabs.innerHTML = "";

      // Determine which "views" are available.
      // - Always: the top-level `output` (single-file rendering of file_template)
      // - For each multi-file: a tab per declared file
      const views = [];
      const hasOutput = (res.output || "").trim().length > 0;
      const hasFiles = filePaths.length > 0;
      if (hasOutput) views.push({ id: "__output__", label: "output", body: res.output });
      filePaths.sort().forEach(p => {
        views.push({ id: p, label: p, body: files[p] });
      });
      if (views.length === 0) {
        views.push({ id: "__output__", label: "(empty)", body: "" });
      }

      views.forEach((v, i) => {
        const b = document.createElement("button");
        b.textContent = v.label;
        b.addEventListener("click", () => { outputMode = "preview"; showView(v); });
        if (i === 0) b.classList.add("active");
        b.dataset.id = v.id;
        tabs.appendChild(b);
      });
      outputMode = "preview"; // start fresh on every new run
      activeFile = views[0];
      showView(views[0]);
      status(hasFiles
        ? `${views.length} output${views.length === 1 ? "" : "s"}`
        : `${(res.output || "").length} bytes`);
      $("output-meta").textContent = res.extension ? `.${res.extension}` : "";
    }

    // Tracks "Preview" vs "Source" mode for the active output tab.
    let outputMode = "preview";

    function showView(v) {
      activeFile = v;
      for (const b of $("output-tabs").children) {
        b.classList.toggle("active", b.dataset.id === v.id);
      }
      renderActive();
    }

    function renderActive() {
      const v = activeFile;
      if (!v) return;
      const container = $("output-container");
      container.innerHTML = "";
      const body = v.body || "";

      const classification = classifyOutput(v, body);
      // For "html" and "markdown" content the default is the rendered
      // preview. For raw text (code, configs, JSON) the default is the
      // source view — there's nothing to "render."
      const canPreview = classification === "html" || classification === "markdown";
      if (!canPreview) outputMode = "source";

      // Toggle controls live inside output-container so they reset per render.
      const toggleBar = document.createElement("div");
      toggleBar.className = "view-toggle";
      const previewBtn = mkBtn("Preview", outputMode === "preview", () => { outputMode = "preview"; renderActive(); });
      const sourceBtn  = mkBtn("Source",  outputMode === "source",  () => { outputMode = "source";  renderActive(); });
      previewBtn.disabled = !canPreview;
      previewBtn.title = canPreview ? "" : "no preview available for this output type";
      toggleBar.appendChild(previewBtn);
      toggleBar.appendChild(sourceBtn);
      toggleBar.appendChild(makeKindBadge(classification));
      container.appendChild(toggleBar);

      const view = document.createElement(outputMode === "preview" ? "iframe" : "pre");
      if (outputMode === "preview") {
        view.className = "preview";
        view.sandbox = "allow-scripts allow-same-origin";
        if (classification === "html") {
          view.srcdoc = body;
        } else if (classification === "markdown") {
          view.srcdoc = renderMarkdownAsPage(body);
        }
      } else {
        view.className = "output";
        view.textContent = body;
      }
      container.appendChild(view);
    }

    function mkBtn(label, active, onClick) {
      const b = document.createElement("button");
      b.textContent = label;
      b.className = "view-btn" + (active ? " active" : "");
      b.addEventListener("click", onClick);
      return b;
    }

    function makeKindBadge(kind) {
      const s = document.createElement("span");
      s.className = "view-kind";
      s.textContent = kind;
      return s;
    }

    // Classify the output as html / markdown / text. Used to pick the
    // right preview renderer.
    function classifyOutput(v, body) {
      const trimmed = body.trimStart().toLowerCase();
      if (trimmed.startsWith("<!doctype html") || trimmed.startsWith("<html")) return "html";
      // The library's declared extension is the strongest signal. The wasm
      // exposes it on currentResult.extension at the top level — but per-
      // file outputs may differ; use the file path's extension when
      // available.
      let ext = "";
      if (v && v.id && v.id !== "__output__" && v.id.includes(".")) {
        ext = v.id.split(".").pop().toLowerCase();
      } else if (currentResult && currentResult.extension) {
        ext = String(currentResult.extension).toLowerCase();
      }
      if (ext === "html" || ext === "htm") return "html";
      if (ext === "md" || ext === "markdown") return "markdown";
      // Best-effort sniff: many Markdown docs start with `# ` or `---\n`.
      if (/^#{1,6} /m.test(body) || /^---\s*\n/.test(body)) return "markdown";
      return "text";
    }

    // Wrap rendered Markdown in a styled HTML document so the iframe is
    // useful standalone (good fonts, max-width, code blocks readable).
    function renderMarkdownAsPage(md) {
      const html = (window.marked ? window.marked.parse(md) : escapeHTML(md));
      return `<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body { margin: 0; padding: 32px 40px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #1f2328; max-width: 760px; line-height: 1.6; }
  h1, h2, h3 { line-height: 1.25; margin-top: 1.4em; }
  h1 { font-size: 2em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
  h3 { font-size: 1.25em; }
  code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.85em; }
  pre { background: #f6f8fa; padding: 14px 16px; border-radius: 6px; overflow: auto; }
  pre code { background: transparent; padding: 0; }
  blockquote { color: #57606a; border-left: 4px solid #d0d7de; padding: 0 1em; margin: 1em 0; }
  table { border-collapse: collapse; margin: 1em 0; }
  th, td { border: 1px solid #d0d7de; padding: 6px 12px; }
  th { background: #f6f8fa; }
  a { color: #0969da; }
  img { max-width: 100%; }
  hr { border: 0; border-top: 1px solid #d0d7de; margin: 2em 0; }
</style>
</head><body>${html}</body></html>`;
    }

    function renderError(res) {
      currentResult = null;
      $("output-tabs").innerHTML = "";
      const container = $("output-container");
      container.innerHTML = "";
      const pre = document.createElement("pre");
      pre.className = "output error";
      // Use the pretty caret-rendered form when available.
      if (res.pretty) {
        pre.textContent = res.pretty;
      } else {
        pre.textContent = `error: ${res.error || "unknown"}`;
        if (res.hint) pre.textContent += `\nhint: ${res.hint}`;
      }
      container.appendChild(pre);
      status("error");
      $("output-meta").textContent = "";
    }

    async function download() {
      if (!currentResult) return;
      const files = currentResult.files || {};
      const ext = currentResult.extension || "txt";
      const paths = Object.keys(files);
      if (paths.length === 0) {
        // Single output → download directly.
        const ext = currentResult.extension || "txt";
        downloadBlob(new Blob([currentResult.output || ""], { type: "text/plain" }),
                     `output.${ext}`);
        return;
      }
      if (paths.length === 1) {
        const p = paths[0];
        downloadBlob(new Blob([files[p]], { type: "text/plain" }), p.replace(/.*\//, ""));
        return;
      }
      // Multi-file → bundle as zip.
      const zip = new JSZip();
      for (const p of paths) zip.file(p, files[p]);
      const blob = await zip.generateAsync({ type: "blob" });
      downloadBlob(blob, "capy-output.zip");
    }

    function downloadBlob(blob, filename) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    $("run-btn").addEventListener("click", run);
    $("download-btn").addEventListener("click", download);
    // Cmd/Ctrl+Enter to run.
    document.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); run(); }
    });

    // Tab toggle for the left pane (Script vs Library).
    for (const btn of document.querySelectorAll(".left-tab")) {
      btn.addEventListener("click", () => {
        const target = btn.dataset.target; // "script" | "library"
        for (const b of document.querySelectorAll(".left-tab")) {
          b.classList.toggle("active", b === btn);
        }
        $("script-wrap").style.display = target === "script" ? "" : "none";
        $("library-wrap").style.display = target === "library" ? "" : "none";
        // Focus the visible textarea so the user can start typing immediately.
        ($(target + "-editor")).focus();
      });
    }

    (async function bootstrap() {
      const [_, ok] = await Promise.all([loadSamples(), initWasm()]);
      // Re-run the default sample now that wasm is up.
      if (window.capyRun) run();
    })();
  </script>
</body>
</html>
