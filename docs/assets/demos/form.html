<!doctype html>
<html><head><meta charset="utf-8"><style>
body{font-family:-apple-system,sans-serif;max-width:480px;margin:2rem auto;padding:0 1rem;}
label{display:block;margin-top:1rem;font-weight:600;font-size:14px;}
input,textarea{width:100%;padding:.5rem;border:1px solid #ccc;border-radius:4px;font-size:14px;}
textarea{height:80px;}
button{margin-top:1.5rem;padding:.6rem 1.2rem;background:#4dd;color:#fff;border:0;border-radius:4px;cursor:pointer;}
</style></head><body>
<form action="/contact" method="post">
  <label for="name">Your name</label>
  <input id="name" name="name" type="text" />
  <label for="email">Email address</label>
  <input id="email" name="email" type="email" />
  <label for="message">Message</label>
  <textarea id="message" name="message"></textarea>

  <button type="submit">Submit</button>
</form>
</body></html>
