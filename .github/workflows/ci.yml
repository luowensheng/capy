name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOPROXY: https://proxy.golang.org,direct
  GOFLAGS: -mod=readonly

jobs:
  test:
    name: test (Go ${{ matrix.go }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        go: ['1.22', '1.23']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -cover ./...

  # Lint is opt-in for now. Run locally with:
  #   golangci-lint run
  # Re-enable in CI by un-commenting the block below once the style
  # baseline is comfortable.
  #
  # lint:
  #   name: lint
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: actions/setup-go@v6
  #       with:
  #         go-version: '1.23'
  #         cache: true
  #     - uses: golangci/golangci-lint-action@v7
  #       with:
  #         version: latest
  #         args: --timeout=3m

  build:
    name: build (${{ matrix.os }})
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
      - name: build
        run: go build -o capy ./cmd/capy
      - name: smoke test
        run: ./capy run samples/transpile-py/lib.yaml samples/transpile-py/script.capy
        shell: bash
