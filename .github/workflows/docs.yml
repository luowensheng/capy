name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          # setup-python's pip cache hashes a dependency file; without
          # this it errors with "No file matched to **/requirements.txt
          # or **/pyproject.toml". Our docs reqs live at the repo root.
          cache-dependency-path: requirements-docs.txt

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt

      - name: Build wasm bundle for playground
        # The playground at docs/assets/playground/ needs capy.wasm +
        # wasm_exec.js + samples.json. Build them fresh from main so the
        # deployed playground tracks the current engine.
        run: |
          set -euxo pipefail
          GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o docs/assets/playground/capy.wasm ./cmd/capy-wasm
          # wasm_exec.js moved between Go releases: lib/wasm/ in 1.24+,
          # misc/wasm/ in earlier versions. Try both so the build doesn't
          # break when CI updates its toolchain.
          GOROOT=$(go env GOROOT)
          if [ -f "$GOROOT/lib/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/lib/wasm/wasm_exec.js" docs/assets/playground/wasm_exec.js
          elif [ -f "$GOROOT/misc/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/misc/wasm/wasm_exec.js" docs/assets/playground/wasm_exec.js
          else
            echo "wasm_exec.js not found under $GOROOT"; exit 1
          fi
          go run ./cmd/playground-bundle > docs/assets/playground/samples.json
          ls -lh docs/assets/playground/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: mkdocs build --strict --verbose

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
