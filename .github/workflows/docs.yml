name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          # setup-python's pip cache hashes a dependency file; without
          # this it errors with "No file matched to **/requirements.txt
          # or **/pyproject.toml". Our docs reqs live at the repo root.
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: mkdocs build --strict --verbose

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
