# Demonstrates library-defined types: pattern (regex) and options (enum).

extension: txt
output_file: ""
comments: ["#"]

types:
  Email:
    pattern: "^[^@]+@[^@]+\\.[^@]+$"
  Status:
    options: ["todo", "in-progress", "done"]
  Slug:
    pattern: "^[a-z][a-z0-9-]*$"

functions:
  set_email:
    args:
      - { kind: capture, name: e, type: Email }
    template: "email = {{ .e }}\n"

  set_status:
    args:
      - { kind: capture, name: s, type: Status }
    template: "status = {{ .s }}\n"

  set_slug:
    args:
      - { kind: capture, name: s, type: Slug }
    template: "slug = {{ .s }}\n"
