# Landing-page DSL → complete responsive HTML page.
#
# Source declares hero, features, CTAs. The library generates a full
# HTML5 document with embedded CSS (no external assets) ready to deploy.

extension: html
output_file: ""

context:
  meta: {}
  features: []
  ctas: []

functions:
  title:
    args:
      - { kind: literal, value: "title" }
      - { kind: capture, name: t, type: any }
    template: ""
    run: |
      set context.meta.title t

  hero:
    args:
      - { kind: literal, value: "hero" }
      - { kind: capture, name: headline, type: any }
      - { kind: capture, name: subhead, type: any }
    template: ""
    run: |
      set context.meta.headline headline
      set context.meta.subhead subhead

  feature:
    args:
      - { kind: literal, value: "feature" }
      - { kind: capture, name: icon, type: any }
      - { kind: capture, name: name, type: any }
      - { kind: capture, name: desc, type: any }
    template: ""
    run: |
      append context.features {icon: icon, name: name, desc: desc}

  cta:
    args:
      - { kind: literal, value: "cta" }
      - { kind: capture, name: label, type: any }
      - { kind: capture, name: href, type: any }
    template: ""
    run: |
      append context.ctas {label: label, href: href}

file_template: |
  <!doctype html>
  <html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .context.meta.title | unquote }}</title>
    <style>
      :root { --fg: #111; --bg: #fff; --muted: #666; --accent: #4dd; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--fg); background: var(--bg); }
      .hero { padding: 6rem 1.5rem; text-align: center; }
      .hero h1 { font-size: clamp(2rem, 5vw, 4rem); margin: 0 0 .5rem; }
      .hero p  { font-size: 1.25rem; color: var(--muted); max-width: 600px; margin: 0 auto 2rem; }
      .ctas a {
        display: inline-block; margin: 0 .5rem; padding: .9rem 1.5rem;
        background: var(--accent); color: #fff; text-decoration: none;
        border-radius: 6px; font-weight: 600;
      }
      .ctas a + a { background: transparent; color: var(--fg); border: 1px solid var(--fg); }
      .features { padding: 4rem 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; max-width: 1100px; margin: 0 auto; }
      .feature h3 { margin: .5rem 0; }
      .feature p  { color: var(--muted); margin: 0; }
      .icon { font-size: 2.5rem; }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>{{ .context.meta.headline | unquote }}</h1>
      <p>{{ .context.meta.subhead | unquote }}</p>
      <div class="ctas">
      {{- range .context.ctas }}
        <a href="{{ .href | unquote }}">{{ .label | unquote }}</a>
      {{- end }}
      </div>
    </section>

    <section class="features">
  {{- range .context.features }}
      <div class="feature">
        <div class="icon">{{ .icon | unquote }}</div>
        <h3>{{ .name | unquote }}</h3>
        <p>{{ .desc | unquote }}</p>
      </div>
  {{- end }}
    </section>
  </body>
  </html>
