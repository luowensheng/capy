# Form spec DSL → HTML form.
extension: html
output_file: ""

functions:
  form:
    args:
      - { kind: literal, value: "form" }
      - { kind: capture, name: action, type: any }
    block: { closer: end }
    template: |
      <form action="{{ .action | unquote }}" method="post">
      {{ .body | indent 2 }}
        <button type="submit">Submit</button>
      </form>

  field:
    args:
      - { kind: literal, value: "field" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: t, type: any }
      - { kind: capture, name: label, type: any }
    template: |
      <label for="{{ .name }}">{{ .label | unquote }}</label>
      <input id="{{ .name }}" name="{{ .name }}" type="{{ .t | unquote }}" />

  textarea:
    args:
      - { kind: literal, value: "textarea" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: label, type: any }
    template: |
      <label for="{{ .name }}">{{ .label | unquote }}</label>
      <textarea id="{{ .name }}" name="{{ .name }}"></textarea>

  end: {}
