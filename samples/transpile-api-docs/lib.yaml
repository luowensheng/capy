# Route definitions → markdown API reference.
extension: md
output_file: ""

context:
  routes: []

functions:
  route:
    args:
      - { kind: literal, value: "route" }
      - { kind: capture, name: method, type: ident }
      - { kind: capture, name: path, type: any }
    block: { closer: end }
    template: |
      ### `{{ .method | upper }} {{ .path | unquote }}`

      {{ .body }}
    run: |
      append context.routes {method: method, path: path}

  summary:
    args:
      - { kind: literal, value: "summary" }
      - { kind: capture, name: s, type: any }
    template: "{{ .s | unquote }}\n\n"

  param:
    args:
      - { kind: literal, value: "param" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: t, type: any }
      - { kind: capture, name: desc, type: any }
    template: "- `{{ .name }}` ({{ .t | unquote }}): {{ .desc | unquote }}\n"

  returns:
    args:
      - { kind: literal, value: "returns" }
      - { kind: capture, name: code, type: int }
      - { kind: capture, name: desc, type: any }
    template: "- `{{ .code }}`: {{ .desc | unquote }}\n"

  end: {}

file_template: |
  # API Reference

  {{ len .context.routes }} routes defined.

  {{ .body }}
