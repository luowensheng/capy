# Keyframe + class DSL → full CSS file with @keyframes, classes, and
# transitions. Compact source, runnable CSS output.

extension: css
output_file: ""

context:
  keyframes: []
  classes: []

functions:
  keyframe:
    args:
      - { kind: literal, value: "keyframe" }
      - { kind: capture, name: name, type: ident }
    block: { closer: end }
    template: |
      @keyframes {{ .name }} {
      {{ .body | indent 2 }}
      }
    run: |
      append context.keyframes name

  # `at <percent> property = value` — single keyframe step.
  at:
    args:
      - { kind: literal, value: "at" }
      - { kind: capture, name: pct, type: int }
      - { kind: capture, name: prop, type: ident }
      - { kind: literal, value: "=" }
      - { kind: capture, name: val, type: any }
    template: "{{ .pct }}% { {{ .prop }}: {{ .val | unquote }}; }\n"

  # `class .selector` ... `end` — a CSS rule.
  class:
    args:
      - { kind: literal, value: "class" }
      - { kind: capture, name: sel, type: any }
    block: { closer: end }
    template: |
      {{ .sel | unquote }} {
      {{ .body | indent 2 }}
      }
    run: |
      append context.classes sel

  prop:
    args:
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: "=" }
      - { kind: capture, name: val, type: any }
    template: "{{ .name | dasherize }}: {{ .val | unquote }};\n"

  animate:
    args:
      - { kind: literal, value: "animate" }
      - { kind: capture, name: keyframe, type: ident }
      - { kind: capture, name: dur, type: any }
      - { kind: capture, name: easing, type: any }
    template: "animation: {{ .keyframe }} {{ .dur | unquote }} {{ .easing | unquote }} infinite;\n"

  hover:
    args:
      - { kind: literal, value: "hover" }
      - { kind: capture, name: prop, type: ident }
      - { kind: literal, value: "=" }
      - { kind: capture, name: val, type: any }
    template: ""
    run: |
      append context.hover_props {prop: prop, val: val}

  end: {}

file_template: |
  /* generated CSS — {{ len .context.keyframes }} keyframes, {{ len .context.classes }} classes */
  {{ .body }}
