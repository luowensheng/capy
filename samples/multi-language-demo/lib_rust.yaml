# Same Capy source → Rust.
extension: rs

functions:
  fn:
    args:
      - { kind: literal, value: "fn" }
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: "(" }
      - { kind: capture, name: a, type: ident }
      - { kind: literal, value: "," }
      - { kind: capture, name: b, type: ident }
      - { kind: literal, value: ")" }
    block: { closer: end }
    template: |
      fn {{ .name }}({{ .a }}: i32, {{ .b }}: i32) -> i32 {
      {{ .body | indent 4 }}
      }

  return:
    args:
      - { kind: literal, value: "return" }
      - { kind: capture, name: l, type: any }
      - { kind: literal, value: "+" }
      - { kind: capture, name: r, type: any }
    template: "return {{ .l }} + {{ .r }};\n"

  main:
    args: [{ kind: literal, value: "main" }]
    block: { closer: end }
    template: |

      fn main() {
      {{ .body | indent 4 }}
      }

  let_call:
    priority: 100
    args:
      - { kind: literal, value: "let" }
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: "=" }
      - { kind: capture, name: fn, type: ident }
      - { kind: literal, value: "(" }
      - { kind: capture, name: a, type: any }
      - { kind: literal, value: "," }
      - { kind: capture, name: b, type: any }
      - { kind: literal, value: ")" }
    template: "let {{ .name }}: i32 = {{ .fn }}({{ .a }}, {{ .b }});\n"

  let:
    args:
      - { kind: literal, value: "let" }
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: "=" }
      - { kind: capture, name: value, type: any }
    template: "let {{ .name }}: i32 = {{ .value }};\n"

  print:
    args:
      - { kind: literal, value: "print" }
      - { kind: capture, name: value, type: any }
    template: "println!(\"{}\", {{ .value }});\n"

  end: {}
