# JSX-ish component DSL → HTML.
#
# Source:
#   component card "Hello" {
#       text "First line"
#       text "Second line"
#   }
#
# Output: HTML

extension: html
output_file: ""

functions:
  component:
    args:
      - { kind: literal, value: "component" }
      - { kind: capture, name: id, type: ident }
      - { kind: capture, name: title, type: any }
    block: { open: "{", close: "}" }
    template: |
      <div id="{{ .id }}" class="card">
        <h3>{{ .title }}</h3>
      {{ .body | indent 2 }}
      </div>

  text:
    args:
      - { kind: literal, value: "text" }
      - { kind: capture, name: content, type: any }
    template: "<p>{{ .content }}</p>\n"
