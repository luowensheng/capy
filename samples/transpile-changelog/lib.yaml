# Changelog DSL → Keep-a-Changelog markdown.
extension: md
output_file: ""

context:
  versions: []

functions:
  version:
    args:
      - { kind: literal, value: "version" }
      - { kind: capture, name: v, type: any }
      - { kind: capture, name: date, type: any }
    block: { closer: end }
    template: |
      ## [{{ .v | unquote }}] — {{ .date | unquote }}

      {{ .body }}

  added:
    args:
      - { kind: literal, value: "added" }
      - { kind: capture, name: msg, type: any }
    template: "- Added: {{ .msg | unquote }}\n"

  changed:
    args:
      - { kind: literal, value: "changed" }
      - { kind: capture, name: msg, type: any }
    template: "- Changed: {{ .msg | unquote }}\n"

  fixed:
    args:
      - { kind: literal, value: "fixed" }
      - { kind: capture, name: msg, type: any }
    template: "- Fixed: {{ .msg | unquote }}\n"

  removed:
    args:
      - { kind: literal, value: "removed" }
      - { kind: capture, name: msg, type: any }
    template: "- Removed: {{ .msg | unquote }}\n"

  end: {}

file_template: |
  # Changelog

  {{ .body }}
