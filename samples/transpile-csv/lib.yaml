# Row DSL → CSV file.
extension: csv
output_file: ""

context:
  header: []
  rows: 0

functions:
  header:
    args:
      - { kind: literal, value: "header" }
      - { kind: capture, name: cols, type: any }
    template: ""
    run: |
      set context.header cols

  row:
    args:
      - { kind: literal, value: "row" }
      - { kind: capture, name: vals, type: any }
    template: ""
    run: |
      append context.rows_list vals

file_template: |
  {{ join "," .context.header }}
  {{- range .context.rows_list }}
  {{ join "," . }}
  {{- end }}
