# Tiny schema DSL → Go interface + struct.
extension: go
output_file: ""

context:
  imports: []

functions:
  package:
    args:
      - { kind: literal, value: "package" }
      - { kind: capture, name: name, type: ident }
    template: "package {{ .name }}\n\n"

  import:
    args:
      - { kind: literal, value: "import" }
      - { kind: capture, name: path, type: any }
    template: ""
    run: |
      append context.imports path

  type:
    args:
      - { kind: literal, value: "type" }
      - { kind: capture, name: name, type: ident }
    block: { closer: end }
    template: |
      type {{ .name }} struct {
      {{ .body | indent 4 }}
      }

  field:
    args:
      - { kind: literal, value: "field" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: t, type: any }
    template: "{{ .name }} {{ .t }}\n"

  end: {}

file_template: |
  {{ .body }}
  {{- if .context.imports }}
  // imports needed: {{ range .context.imports }}{{ . }} {{ end }}
  {{- end }}
