# Message DSL → Slack Block Kit JSON. Paste into Slack's message-builder
# (or POST to a webhook) directly.
extension: json
output_file: ""

context:
  blocks: []

functions:
  header:
    args:
      - { kind: literal, value: "header" }
      - { kind: capture, name: t, type: any }
    template: ""
    run: |
      append context.blocks {type: "header", text: {type: "plain_text", text: t}}

  section:
    args:
      - { kind: literal, value: "section" }
      - { kind: capture, name: t, type: any }
    template: ""
    run: |
      append context.blocks {type: "section", text: {type: "mrkdwn", text: t}}

  divider:
    args:
      - { kind: literal, value: "divider" }
    template: ""
    run: |
      append context.blocks {type: "divider"}

  button:
    args:
      - { kind: literal, value: "button" }
      - { kind: capture, name: label, type: any }
      - { kind: capture, name: url, type: any }
    template: ""
    run: |
      append context.blocks {type: "actions", elements: [{type: "button", text: {type: "plain_text", text: label}, url: url}]}

file_template: |
  {{ .context | toJSONIndent }}
