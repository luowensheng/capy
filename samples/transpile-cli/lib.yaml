# CLI spec DSL → Cobra command definitions in Go.
extension: go
output_file: ""

context:
  commands: []

functions:
  command:
    args:
      - { kind: literal, value: "command" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: desc, type: any }
    template: ""
    run: |
      append context.commands {name: name, desc: desc}

  flag:
    args:
      - { kind: literal, value: "flag" }
      - { kind: capture, name: cmd, type: ident }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: t, type: any }
      - { kind: capture, name: desc, type: any }
    template: ""
    run: |
      append context.flags {cmd: cmd, name: name, type: t, desc: desc}

file_template: |
  package cli

  import "github.com/spf13/cobra"

  {{ range .context.commands }}
  var {{ .name }}Cmd = &cobra.Command{
      Use:   "{{ .name }}",
      Short: {{ .desc | toQuoted }},
  }
  {{ end }}

  func init() {
  {{ range .context.flags }}    {{ .cmd }}Cmd.Flags().String("{{ .name }}", "", {{ .desc | toQuoted }})
  {{ end }}}
