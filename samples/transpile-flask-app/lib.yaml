# Route DSL → Python Flask app.
extension: py
output_file: ""

context:
  routes: []
  port: 5000

functions:
  port:
    args:
      - { kind: literal, value: "port" }
      - { kind: capture, name: p, type: int }
    template: ""
    run: |
      set context.port p

  route:
    args:
      - { kind: literal, value: "route" }
      - { kind: capture, name: method, type: ident }
      - { kind: capture, name: path, type: any }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: body, type: any }
    template: ""
    run: |
      append context.routes {method: method, path: path, name: name, body: body}

file_template: |
  from flask import Flask, jsonify, request

  app = Flask(__name__)
  {{ range .context.routes }}
  @app.route({{ .path | toQuoted }}, methods=[{{ .method | upper | toQuoted }}])
  def {{ .name }}():
      {{ .body }}
  {{ end }}

  if __name__ == "__main__":
      app.run(port={{ .context.port }})
