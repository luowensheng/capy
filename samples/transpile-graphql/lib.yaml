# Schema DSL → GraphQL SDL.
extension: graphql
output_file: ""

functions:
  type:
    args:
      - { kind: literal, value: "type" }
      - { kind: capture, name: name, type: ident }
    block: { closer: end }
    template: |
      type {{ .name }} {
      {{ .body | indent 2 }}
      }

  enum:
    args:
      - { kind: literal, value: "enum" }
      - { kind: capture, name: name, type: ident }
    block: { closer: end }
    template: |
      enum {{ .name }} {
      {{ .body | indent 2 }}
      }

  field:
    args:
      - { kind: literal, value: "field" }
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: ":" }
      - { kind: capture, name: t, type: any }
    template: "{{ .name }}: {{ .t | unquote }}\n"

  required:
    args:
      - { kind: literal, value: "required" }
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: ":" }
      - { kind: capture, name: t, type: any }
    template: "{{ .name }}: {{ .t | unquote }}!\n"

  variant:
    args:
      - { kind: literal, value: "variant" }
      - { kind: capture, name: name, type: ident }
    template: "{{ .name }}\n"

  end: {}
