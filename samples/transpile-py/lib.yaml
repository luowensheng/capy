# A Capy library that defines a tiny source language and transpiles it to Python.
#
# Each function: args list defines its match shape, template contributes to the
# output body, run snippet updates the accumulated context.

extension: py
output_file: ""

# Initial context schema. Run blocks update these.
context:
  imports: []

types:
  Identifier:
    base: any
    pattern: "^[A-Za-z_][A-Za-z0-9_]*$"

functions:
  # `import json` in source — contributes nothing to body; appends "json" to
  # context.imports so the file template can render it at the top.
  import:
    args:
      - { kind: literal, value: "import" }
      - { kind: capture, name: name, type: Identifier }
    template: ""
    run: |
      append context.imports name

  # `say "hello"` → print("hello")
  # Capture is source text — a string literal already has its quotes.
  say:
    args:
      - { kind: capture, name: msg, type: any }
    template: "print({{ .msg }})\n"

  # `<ident> = <any>` → Python assignment. Source-text capture maps directly:
  #   x = 42         →  x = 42
  #   x = "foo"      →  x = "foo"
  #   x = [1,2,3]    →  x = [1, 2, 3]
  #   x = items      →  x = items
  assign:
    args:
      - { kind: capture, name: name, type: Identifier }
      - { kind: literal, value: "=" }
      - { kind: capture, name: value, type: any }
    template: "{{ .name }} = {{ .value }}\n"

  # `if <cond>` ... `end` → Python if-block. `.body` is the rendered child block.
  if:
    args:
      - { kind: literal, value: "if" }
      - { kind: capture, name: cond, type: any }
    block: { closer: end }
    template: |
      if {{ .cond }}:
      {{ .body | indent 4 }}
  end: {}

  # `loop x in xs` ... `end` → Python for-loop.
  loop:
    args:
      - { kind: literal, value: "loop" }
      - { kind: capture, name: var, type: ident }
      - { kind: literal, value: "in" }
      - { kind: capture, name: iter, type: any }
    block: { closer: end }
    template: |
      for {{ .var }} in {{ .iter }}:
      {{ .body | indent 4 }}

# Assembled output: imports at the top, then the program body.
file_template: |
  {{- range .context.imports }}import {{ . }}
  {{ end }}
  {{- .body -}}
