# Tiny declarative source → TypeScript interface + factory.
#
# Source:
#   model User
#       field id : "number"
#       field name : "string"
#       field email : "string"
#   end
#
# Output: TypeScript interface + factory function.

extension: ts
output_file: ""

context:
  models: []

functions:
  model:
    args:
      - { kind: literal, value: "model" }
      - { kind: capture, name: name, type: ident }
    block: { closer: end }
    template: |
      export interface {{ .name }} {
      {{ .body | indent 2 }}
      }
    run: |
      append context.models name

  field:
    args:
      - { kind: literal, value: "field" }
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: ":" }
      - { kind: capture, name: t, type: any }
    template: "{{ .name }}: {{ .t }};\n"

  end: {}

file_template: |
  // Models: {{ join ", " .context.models }}
  {{ .body }}
