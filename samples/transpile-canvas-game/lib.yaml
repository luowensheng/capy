# A tiny game DSL → full HTML5 canvas page with sprites, event handlers,
# and a requestAnimationFrame game loop.
#
# Source declares sprites, key bindings, and update logic. The library
# emits a complete runnable HTML file — drop into a browser to play.

extension: html
output_file: ""

context:
  sprites: []
  keys: []
  updates: []
  init: []

functions:
  game:
    args:
      - { kind: literal, value: "game" }
      - { kind: capture, name: title, type: any }
      - { kind: capture, name: w, type: int }
      - { kind: capture, name: h, type: int }
    template: ""
    run: |
      set context.title title
      set context.width w
      set context.height h

  # `sprite name color x y w h` — register a coloured rectangle.
  sprite:
    args:
      - { kind: literal, value: "sprite" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: color, type: any }
      - { kind: capture, name: x, type: int }
      - { kind: capture, name: y, type: int }
      - { kind: capture, name: w, type: int }
      - { kind: capture, name: h, type: int }
    template: ""
    run: |
      append context.sprites {name: name, color: color, x: x, y: y, w: w, h: h}

  # `on_key key sprite dx dy` — move sprite by (dx,dy) when key is pressed.
  on_key:
    args:
      - { kind: literal, value: "on_key" }
      - { kind: capture, name: key, type: any }
      - { kind: capture, name: target, type: ident }
      - { kind: capture, name: dx, type: int }
      - { kind: capture, name: dy, type: int }
    template: ""
    run: |
      append context.keys {key: key, target: target, dx: dx, dy: dy}

  # `tick name code` — emit raw JS on every frame.
  tick:
    args:
      - { kind: literal, value: "tick" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: code, type: any }
    template: ""
    run: |
      append context.updates {name: name, code: code}

file_template: |
  <!doctype html>
  <html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{ .context.title | unquote }}</title>
    <style>
      body { margin: 0; background: #111; display: grid; place-items: center; min-height: 100vh; font-family: monospace; color: #eee; }
      canvas { background: #222; border: 1px solid #444; image-rendering: pixelated; }
      h1 { margin: 0 0 8px; font-size: 14px; }
    </style>
  </head>
  <body>
    <div>
      <h1>{{ .context.title | unquote }} — arrow keys</h1>
      <canvas id="c" width="{{ .context.width }}" height="{{ .context.height }}"></canvas>
    </div>
    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const keys = {};
      window.addEventListener("keydown", e => keys[e.key] = true);
      window.addEventListener("keyup",   e => keys[e.key] = false);

      const sprites = {
  {{- range .context.sprites }}
        {{ .name }}: { x: {{ .x }}, y: {{ .y }}, w: {{ .w }}, h: {{ .h }}, color: {{ .color | toQuoted }} },
  {{- end }}
      };

      function update() {
  {{- range .context.keys }}
        if (keys[{{ .key | toQuoted }}]) {
          sprites.{{ .target }}.x += {{ .dx }};
          sprites.{{ .target }}.y += {{ .dy }};
        }
  {{- end }}
  {{- range .context.updates }}
        // tick: {{ .name }}
        {{ .code | unquote }}
  {{- end }}
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of Object.values(sprites)) {
          ctx.fillStyle = s.color;
          ctx.fillRect(s.x, s.y, s.w, s.h);
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }
      loop();
    </script>
  </body>
  </html>
