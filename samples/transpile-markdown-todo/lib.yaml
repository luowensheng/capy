# Todo DSL → Markdown checklist.
extension: md
output_file: ""

functions:
  todo:
    args:
      - { kind: literal, value: "todo" }
      - { kind: capture, name: text, type: any }
    template: "- [ ] {{ .text | unquote }}\n"

  done:
    args:
      - { kind: literal, value: "done" }
      - { kind: capture, name: text, type: any }
    template: "- [x] {{ .text | unquote }}\n"

  section:
    args:
      - { kind: literal, value: "section" }
      - { kind: capture, name: title, type: any }
    template: "\n## {{ .title | unquote }}\n\n"

file_template: |
  # Tasks
  {{ .body }}
