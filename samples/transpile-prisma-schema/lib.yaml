# Schema DSL → Prisma schema file.
extension: prisma
output_file: ""

functions:
  datasource:
    args:
      - { kind: literal, value: "datasource" }
      - { kind: capture, name: provider, type: any }
      - { kind: capture, name: url, type: any }
    template: |
      datasource db {
        provider = {{ .provider }}
        url      = {{ .url }}
      }

  generator:
    args:
      - { kind: literal, value: "generator" }
      - { kind: capture, name: provider, type: any }
    template: |

      generator client {
        provider = {{ .provider }}
      }

  model:
    args:
      - { kind: literal, value: "model" }
      - { kind: capture, name: name, type: ident }
    block: { closer: end }
    template: |

      model {{ .name }} {
      {{ .body | indent 2 }}
      }

  id:
    args:
      - { kind: literal, value: "id" }
      - { kind: capture, name: name, type: ident }
    template: "{{ .name }} Int @id @default(autoincrement())\n"

  field:
    args:
      - { kind: literal, value: "field" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: t, type: any }
    template: "{{ .name }} {{ .t | unquote }}\n"

  relation:
    args:
      - { kind: literal, value: "relation" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: model, type: ident }
    template: "{{ .name }} {{ .model }} @relation(fields: [{{ .name }}Id], references: [id])\n{{ .name }}Id Int\n"

  end: {}
