# Typed config DSL → .env file.
#
# Source:
#   set DATABASE_URL "postgres://..."
#   set PORT 5432
#   set DEBUG true
#
# Output: KEY=value lines, with validation that names are SCREAMING_SNAKE.

extension: env
output_file: ""

types:
  EnvName:
    pattern: "^[A-Z][A-Z0-9_]*$"

functions:
  set:
    args:
      - { kind: literal, value: "set" }
      - { kind: capture, name: key, type: EnvName }
      - { kind: capture, name: value, type: any }
    template: "{{ .key }}={{ .value }}\n"
