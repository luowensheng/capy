# Same source, target 1: SQL INSERT statements.
extension: sql

functions:
  user:
    args:
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: age, type: int }
      - { kind: capture, name: status, type: ident }
    template: "INSERT INTO users (name, age, status) VALUES ('{{ .name }}', {{ .age }}, '{{ .status }}');\n"
