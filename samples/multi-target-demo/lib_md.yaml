# Same source, target 3: Markdown table.
extension: md

functions:
  user:
    args:
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: age, type: int }
      - { kind: capture, name: status, type: ident }
    template: "| {{ .name }} | {{ .age }} | {{ .status }} |\n"

file_template: |
  | Name | Age | Status |
  |------|-----|--------|
  {{ .body }}
