# Schedule DSL → crontab entries.
extension: cron
output_file: ""

functions:
  every:
    args:
      - { kind: literal, value: "every" }
      - { kind: capture, name: spec, type: any }
      - { kind: literal, value: "do" }
      - { kind: capture, name: cmd, type: any }
    template: "{{ .spec | unquote }} {{ .cmd | unquote }}\n"

  daily:
    args:
      - { kind: literal, value: "daily" }
      - { kind: capture, name: hour, type: int }
      - { kind: literal, value: "do" }
      - { kind: capture, name: cmd, type: any }
    template: "0 {{ .hour }} * * * {{ .cmd | unquote }}\n"

  weekly:
    args:
      - { kind: literal, value: "weekly" }
      - { kind: capture, name: dow, type: int }
      - { kind: literal, value: "do" }
      - { kind: capture, name: cmd, type: any }
    template: "0 0 * * {{ .dow }} {{ .cmd | unquote }}\n"
