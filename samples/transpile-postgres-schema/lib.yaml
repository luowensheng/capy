# Schema DSL → PostgreSQL DDL with tables, columns, indexes, and FKs.
extension: sql
output_file: ""

context:
  indexes: []
  fks: []

functions:
  table:
    args:
      - { kind: literal, value: "table" }
      - { kind: capture, name: name, type: ident }
    block: { closer: end }
    template: |
      CREATE TABLE {{ .name }} (
      {{ .body | indent 2 }}
      );

  column:
    args:
      - { kind: literal, value: "col" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: t, type: any }
    template: "{{ .name }} {{ .t | unquote }},\n"

  pk:
    args:
      - { kind: literal, value: "pk" }
      - { kind: capture, name: name, type: ident }
    template: "{{ .name }} bigserial PRIMARY KEY,\n"

  unique:
    args:
      - { kind: literal, value: "unique" }
      - { kind: capture, name: name, type: ident }
      - { kind: capture, name: t, type: any }
    template: "{{ .name }} {{ .t | unquote }} UNIQUE NOT NULL,\n"

  fk:
    args:
      - { kind: literal, value: "fk" }
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: "->" }
      - { kind: capture, name: target, type: ident }
    template: "{{ .name }} bigint NOT NULL REFERENCES {{ .target }}(id),\n"

  index:
    args:
      - { kind: literal, value: "index" }
      - { kind: capture, name: table, type: ident }
      - { kind: capture, name: col, type: ident }
    template: ""
    run: |
      append context.indexes {table: table, col: col}

  end: {}

file_template: |
  -- Generated by Capy
  {{ .body }}
  {{ range .context.indexes }}
  CREATE INDEX ix_{{ .table }}_{{ .col }} ON {{ .table }}({{ .col }});
  {{- end }}
