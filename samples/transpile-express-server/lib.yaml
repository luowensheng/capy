# Route DSL → complete Node/Express server file.
extension: js
output_file: ""

context:
  routes: []
  middleware: []
  port: 3000

functions:
  port:
    args:
      - { kind: literal, value: "port" }
      - { kind: capture, name: p, type: int }
    template: ""
    run: |
      set context.port p

  use:
    args:
      - { kind: literal, value: "use" }
      - { kind: capture, name: mw, type: any }
    template: ""
    run: |
      append context.middleware mw

  get:
    args:
      - { kind: literal, value: "get" }
      - { kind: capture, name: path, type: any }
      - { kind: capture, name: handler, type: any }
    template: ""
    run: |
      append context.routes {method: "get", path: path, handler: handler}

  post:
    args:
      - { kind: literal, value: "post" }
      - { kind: capture, name: path, type: any }
      - { kind: capture, name: handler, type: any }
    template: ""
    run: |
      append context.routes {method: "post", path: path, handler: handler}

file_template: |
  const express = require("express");
  const app = express();

  app.use(express.json());
  {{- range .context.middleware }}
  app.use({{ . }});
  {{- end }}

  {{ range .context.routes }}
  app.{{ .method }}({{ .path | toQuoted }}, (req, res) => {
    {{ .handler }}
  });
  {{ end }}

  app.listen({{ .context.port }}, () => {
    console.log("listening on", {{ .context.port }});
  });
