# Invoice DSL → markdown invoice.
extension: md
output_file: ""

context:
  meta: {}
  items: []

functions:
  bill_to:
    args:
      - { kind: literal, value: "bill_to" }
      - { kind: capture, name: name, type: any }
    template: ""
    run: |
      set context.meta.client name

  number:
    args:
      - { kind: literal, value: "number" }
      - { kind: capture, name: n, type: any }
    template: ""
    run: |
      set context.meta.number n

  date:
    args:
      - { kind: literal, value: "date" }
      - { kind: capture, name: d, type: any }
    template: ""
    run: |
      set context.meta.date d

  item:
    args:
      - { kind: literal, value: "item" }
      - { kind: capture, name: desc, type: any }
      - { kind: capture, name: qty, type: int }
      - { kind: capture, name: price, type: any }
    template: ""
    run: |
      append context.items {desc: desc, qty: qty, price: price}

file_template: |
  # Invoice {{ .context.meta.number | unquote }}

  **To:** {{ .context.meta.client | unquote }}
  **Date:** {{ .context.meta.date | unquote }}

  | Item | Qty | Unit price |
  |---|---:|---:|
  {{ range .context.items }}| {{ .desc | unquote }} | {{ .qty }} | {{ .price | unquote }} |
  {{ end }}
