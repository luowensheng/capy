# A tiny high-level source DSL → x86-64 NASM assembly.
#
# The source has variable declarations, arithmetic, and an `exit`
# primitive. The library lowers each construct to real assembly: vars
# accumulate into a `.data` section; statements lower to `.text`
# instructions; the `program` block emits the whole file.
#
# Assemble with:
#   nasm -felf64 demo.asm -o demo.o && ld demo.o -o demo

extension: asm
output_file: ""

context:
  vars: []

functions:
  # Top-level wrapper. Emits the section headers and `_start` label, then
  # the body. `context.vars` (populated by `var` statements) is rendered
  # into `.data` ahead of the body.
  program:
    args:
      - { kind: literal, value: "program" }
      - { kind: capture, name: name, type: any }
    block: { closer: end }
    template: |
      ; program: {{ .name | unquote }}

      section .data
      {{- range .context.vars }}
          {{ . }}: dq 0
      {{- end }}

      section .text
          global _start

      _start:
      {{ .body | indent 4 }}

  # `var <ident> = <int>` — declare and initialise a 64-bit var.
  # Emits the initialisation in .text and registers the symbol for .data.
  var:
    args:
      - { kind: literal, value: "var" }
      - { kind: capture, name: name, type: ident }
      - { kind: literal, value: "=" }
      - { kind: capture, name: val, type: int }
    template: |
      ; var {{ .name }} = {{ .val }}
      mov rax, {{ .val }}
      mov [{{ .name }}], rax
    run: |
      append context.vars name

  # `add <ident> <ident>` — add two memory operands (result left in rax).
  add:
    args:
      - { kind: literal, value: "add" }
      - { kind: capture, name: a, type: ident }
      - { kind: capture, name: b, type: ident }
    template: |
      ; add {{ .a }} {{ .b }}
      mov rax, [{{ .a }}]
      add rax, [{{ .b }}]

  # `store <ident>` — write rax to a variable's memory.
  store:
    args:
      - { kind: literal, value: "store" }
      - { kind: capture, name: name, type: ident }
    template: "mov [{{ .name }}], rax\n"

  # `mov <reg> <val>` — raw register move (escape hatch).
  mov:
    args:
      - { kind: literal, value: "mov" }
      - { kind: capture, name: dst, type: ident }
      - { kind: capture, name: src, type: any }
    template: "mov {{ .dst }}, {{ .src }}\n"

  # `syscall` — bare keyword; emits the instruction.
  syscall:
    args:
      - { kind: literal, value: "syscall" }
    template: "syscall\n"

  # `exit <int>` — sys_exit shim. Loads code into rdi, syscall 60.
  exit:
    args:
      - { kind: literal, value: "exit" }
      - { kind: capture, name: code, type: int }
    template: |
      ; exit {{ .code }}
      mov rdi, {{ .code }}
      mov rax, 60
      syscall

  end: {}
