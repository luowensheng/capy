# Declarative build steps → Dockerfile.
extension: Dockerfile
output_file: ""

functions:
  base:
    args:
      - { kind: literal, value: "base" }
      - { kind: capture, name: img, type: any }
    template: "FROM {{ .img }}\n"

  workdir:
    args:
      - { kind: literal, value: "workdir" }
      - { kind: capture, name: dir, type: any }
    template: "WORKDIR {{ .dir }}\n"

  copy:
    args:
      - { kind: literal, value: "copy" }
      - { kind: capture, name: src, type: any }
      - { kind: literal, value: "to" }
      - { kind: capture, name: dst, type: any }
    template: "COPY {{ .src }} {{ .dst }}\n"

  run_cmd:
    args:
      - { kind: literal, value: "run" }
      - { kind: capture, name: cmd, type: any }
    template: "RUN {{ .cmd }}\n"

  env:
    args:
      - { kind: literal, value: "env" }
      - { kind: capture, name: k, type: ident }
      - { kind: literal, value: "=" }
      - { kind: capture, name: v, type: any }
    template: "ENV {{ .k }}={{ .v }}\n"

  expose:
    args:
      - { kind: literal, value: "expose" }
      - { kind: capture, name: port, type: int }
    template: "EXPOSE {{ .port }}\n"

  entrypoint:
    args:
      - { kind: literal, value: "entrypoint" }
      - { kind: capture, name: cmd, type: any }
    template: "ENTRYPOINT {{ .cmd }}\n"
