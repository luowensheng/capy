# Capy → fully playable Breakout. The DSL is 4 lines of config; the
# library emits a 200-line HTML+JS game with collision detection,
# scoring, win/lose, and a restart loop.
extension: html
output_file: ""

context:
  title: ""
  width: 480
  height: 320
  paddle_w: 80
  paddle_h: 10
  paddle_speed: 7
  ball_r: 6
  ball_vx: 4
  ball_vy: 4
  rows: 5
  cols: 8
  brick_w: 56
  brick_h: 14
  brick_gap: 4

functions:
  game:
    args:
      - { kind: literal, value: "game" }
      - { kind: capture, name: title, type: any }
      - { kind: capture, name: w, type: int }
      - { kind: capture, name: h, type: int }
    template: ""
    run: |
      set context.title title
      set context.width w
      set context.height h

  paddle:
    args:
      - { kind: literal, value: "paddle" }
      - { kind: capture, name: w, type: int }
      - { kind: capture, name: h, type: int }
      - { kind: capture, name: speed, type: int }
    template: ""
    run: |
      set context.paddle_w w
      set context.paddle_h h
      set context.paddle_speed speed

  ball:
    args:
      - { kind: literal, value: "ball" }
      - { kind: capture, name: r, type: int }
      - { kind: capture, name: vx, type: int }
      - { kind: capture, name: vy, type: int }
    template: ""
    run: |
      set context.ball_r r
      set context.ball_vx vx
      set context.ball_vy vy

  bricks:
    args:
      - { kind: literal, value: "bricks" }
      - { kind: capture, name: rows, type: int }
      - { kind: capture, name: cols, type: int }
      - { kind: capture, name: bw, type: int }
      - { kind: capture, name: bh, type: int }
      - { kind: capture, name: gap, type: int }
    template: ""
    run: |
      set context.rows rows
      set context.cols cols
      set context.brick_w bw
      set context.brick_h bh
      set context.brick_gap gap

file_template: |
  <!doctype html>
  <html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{ .context.title | unquote }}</title>
    <style>
      body { margin: 0; background: #0a0a14; display: grid; place-items: center; min-height: 100vh; font-family: ui-monospace, SFMono-Regular, monospace; color: #cfd; }
      canvas { background: #11111a; border: 2px solid #333; box-shadow: 0 0 40px #2bf3; }
      .wrap { text-align: center; }
      .hud  { margin: 8px 0; font-size: 13px; letter-spacing: 0.08em; }
      .hud span { color: #4ef; }
      .hint { color: #678; font-size: 11px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hud">{{ .context.title | unquote }} · score <span id="score">0</span> · lives <span id="lives">3</span></div>
      <canvas id="c" width="{{ .context.width }}" height="{{ .context.height }}"></canvas>
      <div class="hint">← / → to move · space to launch · R to restart</div>
    </div>
    <script>
      (() => {
        const W = {{ .context.width }}, H = {{ .context.height }};
        const PW = {{ .context.paddle_w }}, PH = {{ .context.paddle_h }}, PSPD = {{ .context.paddle_speed }};
        const BR = {{ .context.ball_r }};
        const ROWS = {{ .context.rows }}, COLS = {{ .context.cols }};
        const BW = {{ .context.brick_w }}, BH = {{ .context.brick_h }}, GAP = {{ .context.brick_gap }};
        const ROW_COLORS = ["#f55", "#fa4", "#ff4", "#4f6", "#4af"];

        const c = document.getElementById("c"), ctx = c.getContext("2d");
        const scoreEl = document.getElementById("score"), livesEl = document.getElementById("lives");

        let paddle, ball, bricks, score, lives, launched, keys, raf, gameOver;

        function reset() {
          paddle = { x: (W - PW) / 2, y: H - PH - 8 };
          ball = { x: W / 2, y: paddle.y - BR - 1, vx: 0, vy: 0 };
          launched = false;
          bricks = [];
          const totalW = COLS * BW + (COLS - 1) * GAP;
          const offX = (W - totalW) / 2;
          const offY = 32;
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              bricks.push({
                x: offX + c * (BW + GAP),
                y: offY + r * (BH + GAP),
                w: BW, h: BH,
                color: ROW_COLORS[r % ROW_COLORS.length],
                alive: true,
                value: (ROWS - r) * 10,
              });
            }
          }
          score = 0;
          lives = 3;
          gameOver = false;
          scoreEl.textContent = score;
          livesEl.textContent = lives;
        }

        function launch() {
          if (launched || gameOver) return;
          ball.vx = (Math.random() > 0.5 ? 1 : -1) * {{ .context.ball_vx }};
          ball.vy = -{{ .context.ball_vy }};
          launched = true;
        }

        function loseLife() {
          lives--;
          livesEl.textContent = lives;
          if (lives <= 0) { gameOver = true; return; }
          ball.x = paddle.x + PW / 2;
          ball.y = paddle.y - BR - 1;
          ball.vx = 0; ball.vy = 0;
          launched = false;
        }

        function step() {
          if (keys["ArrowLeft"])  paddle.x = Math.max(0, paddle.x - PSPD);
          if (keys["ArrowRight"]) paddle.x = Math.min(W - PW, paddle.x + PSPD);

          if (!launched) {
            ball.x = paddle.x + PW / 2;
          } else {
            ball.x += ball.vx;
            ball.y += ball.vy;
          }

          if (ball.x - BR < 0)  { ball.x = BR; ball.vx = -ball.vx; }
          if (ball.x + BR > W)  { ball.x = W - BR; ball.vx = -ball.vx; }
          if (ball.y - BR < 0)  { ball.y = BR; ball.vy = -ball.vy; }
          if (ball.y - BR > H)  loseLife();

          if (
            launched &&
            ball.x > paddle.x && ball.x < paddle.x + PW &&
            ball.y + BR > paddle.y && ball.y + BR < paddle.y + PH + 8
          ) {
            ball.y = paddle.y - BR;
            ball.vy = -Math.abs(ball.vy);
            const off = (ball.x - (paddle.x + PW / 2)) / (PW / 2);
            ball.vx = off * (Math.abs({{ .context.ball_vx }}) + 2);
          }

          for (const b of bricks) {
            if (!b.alive) continue;
            if (
              ball.x + BR > b.x && ball.x - BR < b.x + b.w &&
              ball.y + BR > b.y && ball.y - BR < b.y + b.h
            ) {
              b.alive = false;
              const fromLeft = ball.x < b.x, fromRight = ball.x > b.x + b.w;
              if (fromLeft || fromRight) ball.vx = -ball.vx;
              else ball.vy = -ball.vy;
              score += b.value;
              scoreEl.textContent = score;
              break;
            }
          }

          if (bricks.every(b => !b.alive)) gameOver = true;
        }

        function draw() {
          ctx.clearRect(0, 0, W, H);

          for (const b of bricks) {
            if (!b.alive) continue;
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.w, b.h);
          }

          ctx.fillStyle = "#3df";
          ctx.fillRect(paddle.x, paddle.y, PW, PH);

          ctx.beginPath();
          ctx.arc(ball.x, ball.y, BR, 0, Math.PI * 2);
          ctx.fillStyle = "#fff";
          ctx.fill();

          if (gameOver) {
            ctx.fillStyle = "rgba(10, 10, 20, 0.7)";
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = "#cfd";
            ctx.font = "bold 22px ui-monospace, monospace";
            ctx.textAlign = "center";
            const won = bricks.every(b => !b.alive);
            ctx.fillText(won ? "YOU WIN" : "GAME OVER", W / 2, H / 2 - 6);
            ctx.font = "13px ui-monospace, monospace";
            ctx.fillText("press R to restart", W / 2, H / 2 + 18);
          }
        }

        function loop() {
          if (!gameOver) step();
          draw();
          raf = requestAnimationFrame(loop);
        }

        keys = {};
        document.addEventListener("keydown", (e) => {
          keys[e.key] = true;
          if (e.key === " ") { e.preventDefault(); launch(); }
          if (e.key === "r" || e.key === "R") reset();
        });
        document.addEventListener("keyup", (e) => { keys[e.key] = false; });

        reset();
        loop();
      })();
    </script>
  </body>
  </html>
