site_name: Capy
site_description: A transpiler engine driven by a YAML library. Define a tiny source language; get a code generator.
site_url: https://luowensheng.github.io/capy/
repo_url: https://github.com/luowensheng/capy
repo_name: luowensheng/capy
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Capy authors

theme:
  name: material
  palette:
    # Light: monochromatic — white surface, near-black ink, grey accents.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark: near-black surface, near-white ink. Same monochrome spirit.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    # navigation.expand intentionally OFF — sections collapse by default so
    # the sidebar stays scannable. Sections expand when their tab is active.
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  font:
    text: Inter
    code: JetBrains Mono

nav:
  # Five single-page tabs at the top — the quickest entry points.
  - Home: index.md
  - "What's new": whats-new.md
  - Playground: playground.md
  - Showcase: showcase.md

  # AI agents tab — surfaced at the top because the agent / LLM use
  # case is one of the strongest reasons to reach for Capy. Same
  # pages also appear under Integrate so they're discoverable from
  # both lanes.
  - For AI agents:
    - Overview & workflow patterns: ai-agents.md
    - "MCP Apps / AI widgets": mcp-widgets.md
    - Integration cookbook: cookbook-ai.md
    - MCP server: mcp.md
    - One-page LLM brief: CAPY_FOR_LLMS.md

  # Learn — for newcomers, ordered by ramp-up.
  - Learn:
    - For everyone (no code): for-everyone.md
    - Getting started (5 min): getting-started.md
    - "Tutorial 1 · Hello world DSL": tutorials/01-hello-world.md
    - "Tutorial 2 · Building a config DSL": tutorials/02-config-dsl.md
    - "Tutorial 3 · Transpiling to Python": tutorials/03-transpile-python.md
    - "Tutorial 4 · Custom operators": tutorials/04-custom-operators.md
    - Use cases: use-cases.md

  # Patterns — the "how to think about Capy" docs. Read these to
  # understand what's possible before you start building.
  - Patterns:
    - Capy as an idea language: idea-language.md
    - Grammar as contract: grammar-as-contract.md
    - Design systems (React + Vue + Svelte): design-systems.md
    - Backend code with auto-wired tests: backend-codegen.md
    - Supercharge existing syntax: extending-existing-syntax.md
    - One source → many files: one-source-many-files.md
    - Metaprogramming (source-defined functions): metaprogramming.md
    - Progressive abstraction (pick your level): progressive-abstraction.md

  # Reference — everything technical you need when building a library.
  - Reference:
    - Library authoring: library-authoring.md
    - ".capy library syntax": capy-libraries.md
    - Language reference (source side): language-reference.md
    - Templates: templates.md
    - Types: types.md
    - Inner DSL (run blocks): inner-dsl.md
    - "Host capabilities (env / args / read_file)": host-capabilities.md
    - Block functions: block-functions.md
    - Multi-file output & imports: multi-file-and-imports.md
    - Errors & debugging: errors-and-debugging.md
    - Transpiler patterns: transpiler-patterns.md
    - CLI reference: cli.md
    - Auto-generated library docs: library-documentation.md
    - "Library commands + CAPY_LIBS": library-commands.md
    - Feature list: features.md

  # Integrate — connect Capy to other systems.
  - Integrate:
    - Embed in your Go program: embedding.md
    - Compile a library to a standalone binary: compiling-libraries.md
    - "Compile cookbook (CLI, WASM, Docker, npm, …)": cookbook-compile.md
    - MCP server (for AI agents): mcp.md
    - "MCP Apps / AI widgets": mcp-widgets.md
    - AI integration cookbook: cookbook-ai.md
    - Capy for AI agents (overview): ai-agents.md
    - One-page LLM brief: CAPY_FOR_LLMS.md

  # More — supplementary material.
  - More:
    - Cookbook: cookbook.md
    - FAQ: faq.md
    - Architecture: architecture.md
    - Roadmap: roadmap.md
    - Migration guide: migration-guide.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/styles/home.css
  - assets/styles/monochrome.css

plugins:
  - search

# Exclude internal-only notes from the published site.
not_in_nav: |
  /launch/*.md
  /legacy/*.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/luowensheng/capy
  generator: false
