# golangci-lint v2 config. See https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  exclusions:
    rules:
      # Tests can be a bit looser about checking errors.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  # gofmt/goimports moved out of linters in v2.
  enable:
    - gofmt
    - goimports
