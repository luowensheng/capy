# Conservative defaults — tighten over time, don't gate the first release on style.
run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell

issues:
  exclude-rules:
    # Tests can be a bit looser.
    - path: _test\.go
      linters:
        - errcheck
